<!DOCTYPE html>
<!--
  📄 snap-view.html — 게스트 스냅 사진 확인 페이지
  주소: /snap-view.html
  청첩장 주소(슬러그) + 그 청첩장의 수정 비밀번호를 입력하면
  본인만 하객들이 올린 사진을 보고, 선택해서(또는 전체) 다운로드할 수 있어요.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>게스트 스냅 확인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#4A3238;--sage:#C08A96;--line:#EBDCDE;--cream:#FAF5F4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--ink);padding:28px 18px}
.wrap{max-width:680px;margin:0 auto}
h1{font-size:18px;margin-bottom:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px}
input{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:14px;font-family:inherit;background:var(--cream);margin-bottom:10px}
button{border:0;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--ink);color:#fff;width:100%}
button:disabled{opacity:.5;cursor:default}
.hint{font-size:12px;color:#9a8f92;margin-top:8px;line-height:1.8}
#msg{font-size:13px;color:#B0765E;margin-top:10px;min-height:18px}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.top-row .btns{display:flex;gap:8px}
.top-row button{width:auto;background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 14px;font-size:13px;white-space:nowrap}
.top-row button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.thumb{display:block;position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--cream);cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .chk{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.9);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
.thumb.on{outline:3px solid var(--sage)}
.thumb.on .chk{background:var(--sage);color:#fff}
.thumb .open{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border-radius:6px;padding:3px 7px;font-size:11px;text-decoration:none}
.cnt{font-size:13px;color:#9a8f92;margin-bottom:2px}
#dlStatus{font-size:12.5px;color:#9a8f92;margin-top:10px;min-height:16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📸 게스트 스냅 확인</h1>

  <div class="card" id="loginCard">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px">청첩장 주소 (슬러그)</label>
    <input id="slug" placeholder="예: cheolsu-younghee">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px">수정 비밀번호</label>
    <input id="editKey" type="password" placeholder="청첩장 만들 때 정한 비밀번호">
    <button id="loginBtn">확인하기</button>
    <div id="msg"></div>
    <div class="hint">본인이 만든 청첩장의 주소와 수정 비밀번호를 입력하면 하객들이 올린 사진을 볼 수 있어요. 사진 링크는 다른 사람에게 공유하지 마세요.</div>
  </div>

  <div class="card" id="listCard" style="display:none">
    <div class="cnt" id="cnt"></div>
    <div class="top-row">
      <div class="btns">
        <button id="selAllBtn">전체 선택</button>
        <button id="refreshBtn">↺ 새로고침</button>
      </div>
      <div class="btns">
        <button id="dlSelBtn" class="primary" disabled>선택 다운로드 (0)</button>
        <button id="dlAllBtn" class="primary">전체 다운로드</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="hint">사진을 누르면 선택돼요(체크 표시). 모바일에서는 다운로드 시 사진 앱에 저장할 수 있는 공유창이 뜨고, PC에서는 저장할 폴더를 선택할 수 있어요(브라우저에 따라 다운로드 폴더로 바로 저장될 수도 있어요).</div>
    <div id="dlStatus"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
let SLUG='',KEY='',ITEMS=[],SEL=new Set();
const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

async function load(){
  const r=await fetch(`/api/snap?slug=${encodeURIComponent(SLUG)}&editKey=${encodeURIComponent(KEY)}`);
  const j=await r.json();
  if(!r.ok)throw new Error(j.error||'실패');
  return j.items;
}
function updateDlBtn(){
  $('dlSelBtn').textContent=`선택 다운로드 (${SEL.size})`;
  $('dlSelBtn').disabled=SEL.size===0;
}
function render(items){
  ITEMS=items;SEL=new Set();
  $('cnt').textContent=`총 ${items.length}장`;
  const g=$('grid');g.innerHTML='';
  if(!items.length){g.innerHTML='<p style="color:#9a8f92;font-size:13px">아직 올라온 사진이 없어요</p>';}
  items.forEach((it,i)=>{
    const d=document.createElement('div');
    d.className='thumb';d.dataset.i=i;
    d.innerHTML=`<img src="${it.url}" loading="lazy" alt=""><div class="chk">✓</div><a class="open" href="${it.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">원본</a>`;
    d.addEventListener('click',()=>{
      if(SEL.has(i)){SEL.delete(i);d.classList.remove('on');}
      else{SEL.add(i);d.classList.add('on');}
      updateDlBtn();
    });
    g.appendChild(d);
  });
  updateDlBtn();
}
$('loginBtn').addEventListener('click',async()=>{
  SLUG=$('slug').value.trim().toLowerCase();KEY=$('editKey').value;
  $('msg').textContent='';
  if(!SLUG){$('msg').textContent='⚠️ 청첩장 주소를 입력해 주세요.';return;}
  try{
    const items=await load();
    $('loginCard').style.display='none';
    $('listCard').style.display='block';
    render(items);
  }catch(e){$('msg').textContent='⚠️ '+e.message;}
});
$('editKey').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click();});
$('refreshBtn').addEventListener('click',async()=>{
  try{render(await load());}catch(e){alert(e.message);}
});
$('selAllBtn').addEventListener('click',()=>{
  const on=SEL.size<ITEMS.length;
  document.querySelectorAll('.thumb').forEach((d,i)=>{
    if(on){SEL.add(i);d.classList.add('on');}else{SEL.delete(i);d.classList.remove('on');}
  });
  updateDlBtn();
});

/* ── 다운로드 ── */
async function fetchAsFile(url,name){
  const r=await fetch(url);
  const blob=await r.blob();
  return new File([blob],name,{type:blob.type||'image/jpeg'});
}
async function downloadItems(list){
  if(!list.length){alert('선택된 사진이 없어요');return;}
  const status=$('dlStatus');
  status.textContent=`준비 중... (0/${list.length})`;
  $('dlSelBtn').disabled=true;$('dlAllBtn').disabled=true;

  // 1) 모바일: 공유창으로 앨범에 바로 저장할 수 있게
  if(isMobile && navigator.canShare){
    try{
      const files=[];
      for(let i=0;i<list.length;i++){
        status.textContent=`사진 준비 중... (${i+1}/${list.length})`;
        files.push(await fetchAsFile(list[i].url,list[i].name));
      }
      if(navigator.canShare({files})){
        status.textContent='';
        await navigator.share({files,title:'게스트 스냅 사진'});
        $('dlSelBtn').disabled=SEL.size===0;$('dlAllBtn').disabled=false;
        return;
      }
    }catch(e){
      if(e.name==='AbortError'){status.textContent='';$('dlSelBtn').disabled=SEL.size===0;$('dlAllBtn').disabled=false;return;}
      // 공유가 안 되면 아래 방식으로 이어서 시도
    }
  }

  // 2) PC(크롬 등): 저장할 폴더를 직접 선택
  if(!isMobile && window.showDirectoryPicker){
    try{
      const dirHandle=await window.showDirectoryPicker();
      for(let i=0;i<list.length;i++){
        status.textContent=`저장 중... (${i+1}/${list.length})`;
        const file=await fetchAsFile(list[i].url,list[i].name);
        const fh=await dirHandle.getFileHandle(list[i].name,{create:true});
        const w=await fh.createWritable();
        await w.write(file);await w.close();
      }
      status.textContent=`${list.length}장 저장 완료 🤍`;
      $('dlSelBtn').disabled=SEL.size===0;$('dlAllBtn').disabled=false;
      return;
    }catch(e){
      if(e.name==='AbortError'){status.textContent='';$('dlSelBtn').disabled=SEL.size===0;$('dlAllBtn').disabled=false;return;}
    }
  }

  // 3) 위 방법을 지원하지 않는 브라우저: 한 장씩 순서대로 기본 다운로드
  for(let i=0;i<list.length;i++){
    status.textContent=`다운로드 중... (${i+1}/${list.length})`;
    try{
      const file=await fetchAsFile(list[i].url,list[i].name);
      const objUrl=URL.createObjectURL(file);
      const a=document.createElement('a');
      a.href=objUrl;a.download=list[i].name;document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(objUrl),4000);
    }catch(e){
      const a=document.createElement('a');
      a.href=list[i].url;a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();a.remove();
    }
    await new Promise(r=>setTimeout(r,350));
  }
  status.textContent=`${list.length}장 다운로드 완료 🤍`;
  $('dlSelBtn').disabled=SEL.size===0;$('dlAllBtn').disabled=false;
}
$('dlSelBtn').addEventListener('click',()=>downloadItems([...SEL].sort((a,b)=>a-b).map(i=>ITEMS[i])));
$('dlAllBtn').addEventListener('click',()=>downloadItems(ITEMS));

(function(){
  const qs=new URLSearchParams(location.search);
  if(qs.get('slug'))$('slug').value=qs.get('slug');
})();
</script>
</body>
</html>
